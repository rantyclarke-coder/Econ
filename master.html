<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROA — Budget Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;1,400&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1A2744; --navy2:#243358; --gold:#C8A84B; --red:#B3261E;
  --green:#1A6B3C; --white:#FFFFFF; --off:#F7F8FA; --line:#D4D8E0;
  --grey:#6B7280; --black:#0F1117; --cell:#FFFFFF; --head:#EEF0F5;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--off);color:var(--black);font-size:13px;}

/* ── HEADER ── */
.topbar{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;gap:16px;}
.topbar-brand{display:flex;align-items:center;gap:10px;}
.topbar-brand svg{width:32px;height:24px;}
.topbar-brand span{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;letter-spacing:1px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.year-label{font-size:11px;color:rgba(255,255,255,0.6);white-space:nowrap;}
.year-select{background:var(--navy2);color:#fff;border:1px solid rgba(255,255,255,0.2);padding:5px 10px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.year-select option{background:var(--navy);}
.upload-btn{background:transparent;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:5px 12px;font-family:'Barlow',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.upload-btn:hover{background:rgba(255,255,255,0.1);}
#fileInput{display:none;}

/* ── REGION TABS ── */
.region-tabs{display:flex;background:var(--navy2);border-bottom:3px solid var(--gold);}
.region-tab{padding:10px 22px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.5px;color:rgba(255,255,255,0.55);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-3px;transition:all 0.15s;}
.region-tab:hover{color:rgba(255,255,255,0.85);}
.region-tab.active{color:#fff;border-bottom-color:var(--gold);}

/* ── ACTION BAR ── */
.action-bar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:#fff;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.action-bar-label{font-size:11px;color:var(--grey);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-right:4px;}
.btn{padding:6px 14px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;display:flex;align-items:center;gap:5px;}
.btn-nobud{background:#FFF3CD;color:#7D5A00;border:1px solid #E6C96B;}
.btn-nobud:hover{background:#FFE59A;}
.btn-save{background:var(--navy);color:#fff;}
.btn-save:hover{background:var(--navy2);}
.btn-unhide{background:var(--off);color:var(--grey);border:1px solid var(--line);}
.btn-unhide:hover{background:var(--line);}
.debuff-badge{background:#FEE2E2;color:var(--red);border:1px solid #FECACA;padding:4px 10px;font-size:11px;font-weight:700;border-radius:2px;}
.status-msg{font-size:11px;color:var(--grey);font-style:italic;margin-left:auto;}

/* ── TABLE WRAPPER ── */
.table-wrap{overflow-x:auto;padding:0 0 40px;}
table{border-collapse:collapse;min-width:900px;width:100%;}

/* ── COLUMN WIDTHS ── */
col.c-label{width:220px;}
col.c-bracket{width:110px;}
col.c-year{width:110px;}
col.c-pct{width:80px;}
col.c-hidden{display:none;}

/* ── CELLS ── */
td,th{border:1px solid var(--line);padding:0;}
td.label-cell{padding:5px 10px;font-size:12px;color:var(--black);background:var(--cell);white-space:nowrap;}
td.label-cell.indent{padding-left:24px;color:#374151;}
td.bracket-cell{padding:4px 8px;font-size:11px;color:var(--grey);background:var(--cell);font-style:italic;}
td.data-cell{background:var(--cell);padding:0;}
td.data-cell input{width:100%;height:100%;border:none;outline:none;padding:5px 8px;font-family:'Barlow',sans-serif;font-size:12px;color:var(--black);background:transparent;text-align:right;}
td.data-cell input:focus{background:#FFFBE6;outline:2px solid var(--gold);}
td.data-cell input[readonly]{color:var(--grey);background:var(--head);}
td.pct-cell{padding:5px 8px;text-align:right;font-size:12px;font-weight:600;background:var(--head);white-space:nowrap;}
td.pct-cell.pos{color:var(--green);}
td.pct-cell.neg{color:var(--red);}
td.pct-cell.neutral{color:var(--grey);}

/* ── HEADER ROWS ── */
tr.section-head td{background:var(--navy);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;padding:8px 12px;text-align:center;border-color:var(--navy);}
tr.sub-head td{background:var(--head);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--grey);padding:5px 10px;border-color:var(--line);}
tr.sub-head td.col-head{text-align:right;padding-right:8px;}
tr.cat-head td{background:#E8EBF2;font-weight:700;font-size:12px;color:var(--navy);padding:6px 10px;border-color:var(--line);}
tr.cat-head td:first-child{text-align:center;}
tr.total-row td{background:#F0F2F8;font-weight:700;font-size:12px;}
tr.total-row td.label-cell{color:var(--navy);}
tr.summary-row td{background:#E8EBF2;font-weight:700;}
tr.blank-row td{height:10px;background:var(--off);border:none;}

/* ── STATS SECTION ── */
tr.stat-row td.label-cell{font-weight:600;color:var(--navy2);}
tr.stat-row td.data-cell input{font-weight:600;color:var(--navy2);}

/* ── HIDDEN YEAR COLS ── */
.col-hidden{display:none;}
.col-hidden.shown{display:table-cell;}

/* ── STATS OUTPUT ── */
.stats-computed{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;background:#fff;border-top:1px solid var(--line);}
.stat-card{border:1px solid var(--line);padding:12px 14px;background:var(--off);}
.stat-card .s-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--grey);margin-bottom:4px;}
.stat-card .s-value{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--navy);}
.stat-card .s-sub{font-size:11px;color:var(--grey);margin-top:2px;}
.stat-card.leading .s-value{color:var(--green);}
.stat-card.lagging .s-value{color:var(--red);}

/* ── NO BUDGET OVERLAY ── */
.nobud-bar{display:none;background:#FEF3C7;border:1px solid #FCD34D;padding:8px 20px;font-size:12px;color:#78350F;align-items:center;gap:10px;}
.nobud-bar.shown{display:flex;}
.nobud-bar strong{font-weight:700;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <svg viewBox="0 0 60 40">
      <polygon points="0,30 22,30 30,18 8,18" fill="#B3261E"/>
      <polygon points="6,22 28,22 36,10 14,10" fill="#4A6FBF"/>
      <polygon points="12,14 34,14 42,2 20,2" fill="#B3261E"/>
    </svg>
    <span>PROA BUDGET LEDGER</span>
  </div>
  <div class="topbar-right">
    <span class="year-label">FISCAL YEAR</span>
    <select class="year-select" id="yearSelect"></select>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload .docx
    </button>
    <input type="file" id="fileInput" accept=".docx">
  </div>
</div>

<!-- REGION TABS -->
<div class="region-tabs">
  <div class="region-tab active" data-region="NewEngland">New England</div>
  <div class="region-tab" data-region="Dixie">Dixie</div>
  <div class="region-tab" data-region="Pacifica">Pacifica</div>
  <div class="region-tab" data-region="Lincoln">Lincoln</div>
</div>

<!-- ACTION BAR -->
<div class="action-bar">
  <span class="action-bar-label">Actions:</span>
  <button class="btn btn-nobud" id="noBudgetBtn">⚠ No Budget This Year</button>
  <button class="btn btn-save" id="saveBtn">💾 Save to Ledger</button>
  <button class="btn btn-unhide" id="unhideBtn">Show All Years</button>
  <span id="debuffBadge" class="debuff-badge" style="display:none;"></span>
  <span class="status-msg" id="statusMsg"></span>
</div>

<!-- NO BUDGET BAR -->
<div class="nobud-bar" id="noBudBar">
  <strong>⚠ No Budget Filed</strong>
  <span id="noBudMsg"></span>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table id="ledgerTable">
    <colgroup>
      <col class="c-label">
      <col class="c-bracket" id="colBracket">
      <!-- year cols injected by JS -->
    </colgroup>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- STATS CARDS -->
<div class="stats-computed" id="statsCards"></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const REGIONS = ['NewEngland','Dixie','Pacifica','Lincoln'];
const REGION_LABELS = {NewEngland:'New England',Dixie:'Dixie',Pacifica:'Pacifica',Lincoln:'Lincoln'};
const GDP_1991 = {NewEngland:1.40,Dixie:1.10,Pacifica:0.90,Lincoln:0.70};
const GROWTH_RATE = {NewEngland:0.029,Dixie:0.022,Pacifica:0.024,Lincoln:0.012};
const DEBT_DEFAULTS = {NewEngland:648,Dixie:509,Pacifica:418,Lincoln:325};

// All valid fiscal years (bi-annual, 1993-94 to 2019-20)
const FISCAL_YEARS = [];
for(let y=1993;y<=2019;y+=2) FISCAL_YEARS.push(y+'-'+(String(y+1).slice(-2)));

// Row definitions
const TAX_ROWS = [
  // Income tax
  {id:'inc_Lower',  label:'Lower Class',   bracket:'$0 – $8,000',   cat:'income',   section:'tax'},
  {id:'inc_Middle', label:'Middle Class',  bracket:'$8k – $25,000', cat:'income',   section:'tax'},
  {id:'inc_Upper',  label:'Upper Class',   bracket:'$25,000+',      cat:'income',   section:'tax'},
  // Corporate
  {id:'corp_Small', label:'Small & Medium',bracket:'$0 – $50,000',  cat:'corp',     section:'tax'},
  {id:'corp_Large', label:'Large Business',bracket:'$50,000+',      cat:'corp',     section:'tax'},
  // Sales/Excise
  {id:'sales_Gasoline',label:'Gasoline',   bracket:'',              cat:'excise',   section:'tax'},
  {id:'sales_Alcohol', label:'Alcohol',    bracket:'',              cat:'excise',   section:'tax'},
  {id:'sales_Tobacco', label:'Tobacco',    bracket:'',              cat:'excise',   section:'tax'},
  // Services
  {id:'serv_GeneralSales',label:'General Sales',bracket:'',         cat:'services', section:'tax'},
  {id:'serv_Services',    label:'Services',     bracket:'',         cat:'services', section:'tax'},
  {id:'serv_CapitalGains',label:'Capital Gains',bracket:'Long Term',cat:'services', section:'tax'},
];

const DEPT_ROWS = [
  {id:'expEducation', label:'Department of Education'},
  {id:'expSafety',    label:'Department of Public Safety'},
  {id:'expHealth',    label:'Department of Health'},
  {id:'expTransport', label:'Department of Transportation'},
  {id:'expLabour',    label:'Department of Labour'},
  {id:'expJustice',   label:'Department of Justice'},
  {id:'expHUD',       label:'Department of Housing & Urban Development'},
  {id:'expAg',        label:'Department of Agriculture'},
  {id:'expSocial',    label:'Department of Social Services'},
  {id:'expAdmin',     label:'General Administration'},
  {id:'expTreasury',  label:'Department of Treasury'},
];

const SUMMARY_ROWS = [
  {id:'netInterest',  label:'Net Interest on Debt', readonly:true},
  {id:'totalRevenue', label:'Total Revenue',         readonly:true},
  {id:'totalExp',     label:'Total Expenditure',     readonly:true},
  {id:'surplus',      label:'Surplus / Deficit',     readonly:true},
  {id:'totalDebt',    label:'Total Debt',            readonly:false},
];

// ── STATE ──────────────────────────────────────────────────────────────────────
let currentRegion = 'NewEngland';
let currentYearStr = FISCAL_YEARS[0]; // '1993-94'
let allData = {}; // allData[region][yearStr][fieldId] = value
let noBudgetFlags = {}; // noBudgetFlags[region][yearStr] = { consecutive, debuff }
let hiddenCols = true;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function parseYear(str){ const m=(str||'').match(/(\d{4})/); return m?parseInt(m[1]):1993; }
function fy(str){ return parseYear(str); } // returns start year integer
function prevFY(str){
  const y=parseYear(str);
  return (y-2)+'-'+(String(y-1).slice(-2));
}
function nextFY(str){
  const y=parseYear(str);
  return (y+2)+'-'+(String(y+3).slice(-2));
}
function fmtNum(n,decimals=2){
  if(n==null||isNaN(n)) return '';
  return Number(n).toFixed(decimals);
}
function fmtPct(cur,prev){
  if(cur==null||prev==null||prev==0) return {str:'—',cls:'neutral'};
  const p=((cur-prev)/Math.abs(prev))*100;
  if(Math.abs(p)<0.01) return {str:'0.00%',cls:'neutral'};
  return {str:(p>0?'+':'')+p.toFixed(2)+'%', cls:p>0?'pos':'neg'};
}
function regionGDP(region,yr){ return GDP_1991[region]*Math.pow(1+GROWTH_RATE[region],yr-1991); }

function getData(region,yearStr,field){
  return allData[region]&&allData[region][yearStr]?allData[region][yearStr][field]:null;
}
function setData(region,yearStr,field,val){
  if(!allData[region]) allData[region]={};
  if(!allData[region][yearStr]) allData[region][yearStr]={};
  allData[region][yearStr][field]=val;
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
async function saveAllToStorage(){
  if(!window.storage) return false;
  // Save full ledger state
  try{
    await window.storage.set('ledger:allData', JSON.stringify(allData), true);
    await window.storage.set('ledger:noBudgetFlags', JSON.stringify(noBudgetFlags), true);
  }catch(e){ console.error('Save error',e); return false; }

  // Also write per-region/year keys in budget form format so budget form can read them
  for(const region of REGIONS){
    if(!allData[region]) continue;
    for(const yearStr of FISCAL_YEARS){
      if(!allData[region][yearStr]) continue;
      const d = allData[region][yearStr];
      const rates={};
      TAX_ROWS.forEach(r=>{ if(d[r.id+'_rate']!=null) rates[r.id]=parseFloat(d[r.id+'_rate'])||0; });
      const depts={};
      DEPT_ROWS.forEach(r=>{ if(d[r.id]!=null) depts[r.id]=parseFloat(d[r.id])||0; });
      const yr=parseYear(yearStr);
      const payload={
        rates, depts,
        grants: parseFloat(d['grants'])||0,
        priorDebt: parseFloat(d['totalDebt'])||DEBT_DEFAULTS[region],
        interestRate: parseFloat(d['interestRate'])||4,
        customPrograms:[], sponsor:'',
        noBudget: noBudgetFlags[region]&&noBudgetFlags[region][yearStr]?true:false
      };
      try{ await window.storage.set('budget:'+region+':'+yr, JSON.stringify(payload), true); }
      catch(e){ console.warn('Budget key write failed',region,yearStr,e); }
    }
  }
  return true;
}

async function loadFromStorage(){
  if(!window.storage) return;
  try{
    const d=await window.storage.get('ledger:allData',true);
    if(d) allData=JSON.parse(d.value);
    const f=await window.storage.get('ledger:noBudgetFlags',true);
    if(f) noBudgetFlags=JSON.parse(f.value);
  }catch(e){ console.warn('Load error',e); }
}

// ── ECON ENGINE (for auto-compute) ────────────────────────────────────────────
// Rough tax base estimates for revenue calculation
const CONSUMPTION_SHARE=0.65;
const SALES_SHARE={Gasoline:0.04,Alcohol:0.015,Tobacco:0.01};
const SERVICES_SHARE={GeneralSales:0.20,Services:0.15};
const CAPGAINS_SHARE=0.03;
// Income distribution approximation
const INCOME_DIST={Lower:0.35,Middle:0.45,Upper:0.20};
const CORP_DIST={Small:0.40,Large:0.60};

function estimateTaxBase(region,yr,rowId){
  const gdp=regionGDP(region,yr)*1e12;
  if(rowId==='inc_Lower')  return gdp*0.55*INCOME_DIST.Lower;
  if(rowId==='inc_Middle') return gdp*0.55*INCOME_DIST.Middle;
  if(rowId==='inc_Upper')  return gdp*0.55*INCOME_DIST.Upper;
  if(rowId==='corp_Small') return gdp*0.12*CORP_DIST.Small;
  if(rowId==='corp_Large') return gdp*0.12*CORP_DIST.Large;
  if(rowId==='sales_Gasoline') return gdp*CONSUMPTION_SHARE*SALES_SHARE.Gasoline;
  if(rowId==='sales_Alcohol')  return gdp*CONSUMPTION_SHARE*SALES_SHARE.Alcohol;
  if(rowId==='sales_Tobacco')  return gdp*CONSUMPTION_SHARE*SALES_SHARE.Tobacco;
  if(rowId==='serv_GeneralSales')  return gdp*CONSUMPTION_SHARE*SERVICES_SHARE.GeneralSales;
  if(rowId==='serv_Services')      return gdp*CONSUMPTION_SHARE*SERVICES_SHARE.Services;
  if(rowId==='serv_CapitalGains')  return gdp*CAPGAINS_SHARE;
  return 0;
}

function computeSummary(region,yearStr){
  const yr=parseYear(yearStr);
  const d=allData[region]&&allData[region][yearStr]?allData[region][yearStr]:{};

  // Revenue
  let income=0,corp=0,excise=0,services=0;
  TAX_ROWS.forEach(r=>{
    const rate=(parseFloat(d[r.id+'_rate'])||0)/100;
    const base=estimateTaxBase(region,yr,r.id);
    const rev=base*rate;
    if(r.cat==='income') income+=rev;
    else if(r.cat==='corp') corp+=rev;
    else if(r.cat==='excise') excise+=rev;
    else if(r.cat==='services') services+=rev;
  });
  const grants=0.18*(income+corp);
  const totalRevenue=income+corp+excise+services+grants;

  // Expenditures
  let deptTotal=0;
  DEPT_ROWS.forEach(r=>{ deptTotal+=(parseFloat(d[r.id])||0)*1e9; });

  // Debt
  const priorDebt=(parseFloat(d['prevDebt'])||DEBT_DEFAULTS[region])*1e9;
  const interestRate=parseFloat(d['interestRate'])||4;
  const netInterest=priorDebt*(interestRate/100);
  const operatingExp=deptTotal+netInterest;
  const balance=totalRevenue-operatingExp;
  const payDown=balance>0?balance:0;
  const totalExp=operatingExp+payDown;
  const totalDebt=priorDebt-balance;

  return {income,corp,excise,services,grants,totalRevenue,deptTotal,netInterest,operatingExp,totalExp,balance,totalDebt,payDown,interestRate,priorDebt};
}

function computeStats(region,yearStr){
  const yr=parseYear(yearStr);
  const prevYr=prevFY(yearStr);
  const d=allData[region]&&allData[region][yearStr]?allData[region][yearStr]:{};
  const prevD=allData[region]&&allData[region][prevYr]?allData[region][prevYr]:{};
  const s=computeSummary(region,yearStr);
  const gdpBase=regionGDP(region,yr)*1e12;

  // GDP: base + spending multiplier effect
  const spendPct=s.totalExp/gdpBase;
  const gdpBoost=0.30*spendPct; // 30% of spending feeds back as GDP
  const deficitDrag=s.balance<0?Math.abs(s.balance)/gdpBase*0.15:0;
  const nobud=noBudgetFlags[region]&&noBudgetFlags[region][yearStr];
  const debuffDrag=nobud?(nobud.consecutive||1)*0.005:0;
  const gdp=gdpBase*(1+gdpBoost-deficitDrag-debuffDrag);

  // Unemployment: base from engine, reduced by labour+commerce spend
  const baseUnemployment=10.0-(yr-1991)*0.25; // rough downward trend
  const labourSpend=(parseFloat(d['expLabour'])||0)*1e9;
  const labourEffect=Math.min(3,(labourSpend/gdpBase)*100*8);
  const corpTax=(parseFloat(d['corp_Large_rate'])||21)/100;
  const corpDrag=corpTax*5;
  const unemployment=Math.max(2,baseUnemployment-labourEffect+corpDrag-gdpBoost*10);

  // Poverty
  const socialSpend=((parseFloat(d['expSocial'])||0)+(parseFloat(d['expHealth'])||0)+(parseFloat(d['expEducation'])||0))*1e9;
  const socialEffect=Math.min(4,(socialSpend/gdpBase)*100*6);
  const basePoverty=14.0-(yr-1993)*0.2;
  const poverty=Math.max(3,basePoverty-socialEffect+unemployment*0.3);

  // Average Income
  const gdpPerCapita=gdp/(3e7*(gdpBase/4.1e12)); // rough pop estimate
  const avgIncome=gdpPerCapita*0.72*(1-0.015*((parseFloat(d['inc_Middle_rate'])||15)/100*100-10));

  // Cost of Living
  const hudSpend=(parseFloat(d['expHUD'])||0)*1e9;
  const hudEffect=Math.min(800,(hudSpend/gdpBase)*100*4000);
  const salesTaxBurden=(parseFloat(d['serv_GeneralSales_rate'])||18)/100*5000;
  const baseCOL=12000+(yr-1991)*350;
  const costOfLiving=Math.max(8000,baseCOL-hudEffect+salesTaxBurden+deficitDrag*50000);

  // Leading/Lagging sector
  let leading='—',lagging='—',maxChg=-Infinity,minChg=Infinity;
  DEPT_ROWS.forEach(r=>{
    const cur=parseFloat(d[r.id])||0;
    const prev=parseFloat(prevD[r.id])||0;
    if(prev>0){
      const chg=(cur-prev)/prev*100;
      if(chg>maxChg){ maxChg=chg; leading=r.label.replace('Department of ','').replace('General Administration','Gen. Admin'); }
      if(chg<minChg){ minChg=chg; lagging=r.label.replace('Department of ','').replace('General Administration','Gen. Admin'); }
    }
  });

  return {
    gdp, unemployment:unemployment.toFixed(1), poverty:poverty.toFixed(1),
    avgIncome:Math.round(avgIncome), costOfLiving:Math.round(costOfLiving),
    totalDebt:s.totalDebt, leading, lagging
  };
}

// ── NO BUDGET ─────────────────────────────────────────────────────────────────
function applyNoBudget(){
  const region=currentRegion;
  const yearStr=currentYearStr;
  const prevYr=prevFY(yearStr);
  const prevD=allData[region]&&allData[region][prevYr]?allData[region][prevYr]:{};
  const gr=GROWTH_RATE[region];

  if(!noBudgetFlags[region]) noBudgetFlags[region]={};
  // Count consecutive
  const prevFlag=noBudgetFlags[region][prevFY(prevYr)];
  const consecutive=(prevFlag?prevFlag.consecutive:0)+1;
  noBudgetFlags[region][yearStr]={consecutive,debuff:consecutive>=2};

  // Copy prev year values at growth rate
  if(!allData[region]) allData[region]={};
  if(!allData[region][yearStr]) allData[region][yearStr]={};
  const d=allData[region][yearStr];

  // Tax rates stay same
  TAX_ROWS.forEach(r=>{
    const key=r.id+'_rate';
    d[key]=prevD[key]!=null?prevD[key]:d[key];
  });
  // Dept spending grows at regional rate (with debuff drag)
  const debuffMultiplier=consecutive>=2?Math.max(0,1-consecutive*0.005):1;
  DEPT_ROWS.forEach(r=>{
    const prev=parseFloat(prevD[r.id])||0;
    d[r.id]=fmtNum(prev*(1+gr)*debuffMultiplier);
  });
  d['interestRate']=prevD['interestRate']||4;
  d['prevDebt']=prevD['totalDebt']||prevD['prevDebt']||DEBT_DEFAULTS[region];

  rebuildTable();
  renderStats();
  showNoBudBar(consecutive);
  document.getElementById('statusMsg').textContent='No Budget applied — values auto-filled at growth rate.';
  if(consecutive>=2){
    const badge=document.getElementById('debuffBadge');
    badge.textContent='⚠ Inactivity Debuff ×'+consecutive;
    badge.style.display='inline-block';
  }
}

function showNoBudBar(consecutive){
  const bar=document.getElementById('noBudBar');
  const msg=document.getElementById('noBudMsg');
  bar.classList.add('shown');
  if(consecutive>=2){
    msg.textContent=`${consecutive} consecutive missed budgets — inactivity debuff active. GDP growth reduced by ${(consecutive*0.5).toFixed(1)}%.`;
  } else {
    msg.textContent='Budget auto-filled at regional growth rate. No penalties yet.';
  }
}

// ── DOCX PARSER ───────────────────────────────────────────────────────────────
async function parseDocx(file){
  if(typeof JSZip==='undefined'){
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
  }
  const ab=await file.arrayBuffer();
  const zip=await JSZip.loadAsync(ab);
  const xml=await zip.file('word/document.xml').async('string');

  // Extract all text nodes in order
  const texts=[];
  const re=/<w:t[^>]*>([^<]*)<\/w:t>/g;
  let m;
  while((m=re.exec(xml))!==null) if(m[1].trim()) texts.push(m[1].trim());
  const full=texts.join(' ');

  const d={};
  const found={};

  // Helper: find value after a known label
  function extract(label,unit='%'){
    const idx=texts.findIndex(t=>t.includes(label));
    if(idx<0) return null;
    // Look in next few tokens for a number
    for(let i=idx+1;i<Math.min(idx+8,texts.length);i++){
      const n=parseFloat(texts[i].replace(/[^0-9.\-]/g,''));
      if(!isNaN(n)&&n>0) return n;
    }
    return null;
  }

  // Tax rates
  const rateMap={
    'Lower Class':'inc_Lower','Middle Class':'inc_Middle','Upper Class':'inc_Upper',
    'Small & Medium':'corp_Small','Large Business':'corp_Large',
    'Gasoline':'sales_Gasoline','Alcohol':'sales_Alcohol','Tobacco':'sales_Tobacco',
    'General Sales':'serv_GeneralSales','Service Industry':'serv_Services',
    'Capital Gains':'serv_CapitalGains'
  };
  Object.entries(rateMap).forEach(([label,id])=>{
    // Find the rate — look for "x.xx%" after the label
    const idx=texts.findIndex(t=>t.includes(label));
    if(idx<0) return;
    for(let i=idx;i<Math.min(idx+10,texts.length);i++){
      const m2=texts[i].match(/(\d+\.\d+)%/);
      if(m2){ d[id+'_rate']=parseFloat(m2[1]); found[id]=true; break; }
      // Also check "x.xx%" format split across tokens like "| 6.35%"
      const m3=texts[i].match(/\|\s*(\d+\.\d+)%?/);
      if(m3){ d[id+'_rate']=parseFloat(m3[1]); found[id]=true; break; }
    }
  });

  // Dept spending — look for "$x,xxx,xxx,xxx" or "$x.xxB" after dept name
  const deptMap={
    'DEPARTMENT OF EDUCATION':'expEducation','DEPARTMENT OF HEALTH':'expHealth',
    'DEPARTMENT OF TRANSPORTATION':'expTransport','DEPARTMENT OF PUBLIC SAFETY':'expSafety',
    'DEPARTMENT OF JUSTICE':'expJustice','DEPARTMENT OF HOUSING':'expHUD',
    'DEPARTMENT OF COMMERCE':'expLabour','DEPARTMENT OF FOOD':'expAg',
    'DEPARTMENT OF TREASURY':'expTreasury','GENERAL ADMINISTRATION':'expAdmin',
    'DEPARTMENT OF SOCIAL':'expSocial'
  };
  Object.entries(deptMap).forEach(([label,id])=>{
    const idx=texts.findIndex(t=>t.toUpperCase().includes(label));
    if(idx<0) return;
    for(let i=idx+1;i<Math.min(idx+6,texts.length);i++){
      // Match "$x,xxx,xxx,xxx"
      const m2=texts[i].match(/\$([0-9,]+)/);
      if(m2){ d[id]=parseFloat(m2[1].replace(/,/g,''))/1e9; found[id]=true; break; }
      // Match "$x.xxB"
      const m3=texts[i].match(/\$([\d.]+)B/);
      if(m3){ d[id]=parseFloat(m3[1]); found[id]=true; break; }
    }
  });

  // Debt
  const debtIdx=texts.findIndex(t=>t.includes('REGIONAL DEBT'));
  if(debtIdx>=0){
    for(let i=debtIdx+1;i<Math.min(debtIdx+6,texts.length);i++){
      const m2=texts[i].match(/\$([0-9,]+)/);
      if(m2){ d['totalDebt']=parseFloat(m2[1].replace(/,/g,''))/1e9; break; }
    }
  }

  // Merge into current year data
  const region=currentRegion;
  const yearStr=currentYearStr;
  if(!allData[region]) allData[region]={};
  if(!allData[region][yearStr]) allData[region][yearStr]={};
  Object.assign(allData[region][yearStr],d);

  const parsedCount=Object.keys(found).length;
  rebuildTable();
  renderStats();
  document.getElementById('statusMsg').textContent=`Parsed ${parsedCount} values from .docx.`;
}

function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

// ── TABLE BUILD ───────────────────────────────────────────────────────────────
function getVisibleYears(){
  const curIdx=FISCAL_YEARS.indexOf(currentYearStr);
  const prevIdx=curIdx-1;
  const prevYrStr=prevIdx>=0?FISCAL_YEARS[prevIdx]:null;
  // Always show: all years up to current, hidden ones toggled
  const allYears=FISCAL_YEARS.slice(0,curIdx+1);
  if(hiddenCols){
    return {visible:[prevYrStr,currentYearStr].filter(Boolean), all:allYears};
  }
  return {visible:allYears, all:allYears};
}

function cellId(yearStr,field){ return 'c_'+yearStr.replace(/[^a-z0-9]/gi,'_')+'_'+field; }

function makeDataCell(yearStr,field,readonly=false,isCurrency=false){
  const val=getData(currentRegion,yearStr,field);
  const display=val!=null?fmtNum(val,isCurrency?2:2):'';
  return `<td class="data-cell">
    <input type="number" id="${cellId(yearStr,field)}" value="${display}"
      step="0.01" ${readonly?'readonly':''} placeholder="—"
      data-year="${yearStr}" data-field="${field}">
  </td>`;
}

function makePctCell(yearStr,field,prevYearStr){
  if(!prevYearStr) return '<td class="pct-cell neutral">—</td>';
  const cur=getData(currentRegion,yearStr,field);
  const prev=getData(currentRegion,prevYearStr,field);
  const {str,cls}=fmtPct(parseFloat(cur),parseFloat(prev));
  return `<td class="pct-cell ${cls}">${str}</td>`;
}

function buildColHeader(years){
  const prevYr=years[years.length-2]||null;
  const curYr=years[years.length-1];
  let html='<tr class="sub-head"><td>Category</td><td>Bracket / Detail</td>';
  years.forEach(y=>{
    const isHidden=hiddenCols&&y!==curYr&&y!==prevYr;
    html+=`<td class="col-head${isHidden?' col-hidden':''}">${y}</td>`;
    if(y===curYr||y===prevYr){
      // % change col only between prev and current
    }
  });
  if(prevYr) html+=`<td class="col-head">% Change</td>`;
  html+='</tr>';
  return html;
}

function buildTaxRows(years){
  const prevYr=years.length>=2?years[years.length-2]:null;
  const curYr=years[years.length-1];
  let html='';

  const cats=[
    {key:'income',label:'INCOME TAX',unit:'%'},
    {key:'corp',label:'CORPORATE TAX',unit:'%'},
    {key:'excise',label:'EXCISE TAX (SALES)',unit:'%'},
    {key:'services',label:'SERVICES TAX',unit:'%'},
  ];

  cats.forEach(cat=>{
    html+=`<tr class="cat-head"><td colspan="2">${cat.label}</td>`;
    years.forEach(y=>{
      const isHidden=hiddenCols&&y!==curYr&&y!==prevYr;
      html+=`<td class="${isHidden?'col-hidden':''}" style="background:#E8EBF2;"></td>`;
    });
    if(prevYr) html+=`<td style="background:#E8EBF2;"></td>`;
    html+='</tr>';

    TAX_ROWS.filter(r=>r.cat===cat.key).forEach(r=>{
      html+=`<tr><td class="label-cell indent">${r.label}</td><td class="bracket-cell">${r.bracket}</td>`;
      years.forEach(y=>{
        const isHidden=hiddenCols&&y!==curYr&&y!==prevYr;
        html+=`<td class="data-cell${isHidden?' col-hidden':''}">
          <input type="number" id="${cellId(y,r.id+'_rate')}" value="${fmtNum(getData(currentRegion,y,r.id+'_rate'))}"
            step="0.01" placeholder="—" data-year="${y}" data-field="${r.id+'_rate'}">
        </td>`;
      });
      if(prevYr) html+=makePctCell(curYr,r.id+'_rate',prevYr);
      html+='</tr>';
    });
  });

  // Federal Grants (auto)
  html+=`<tr class="cat-head"><td colspan="2">FEDERAL GRANTS</td>`;
  years.forEach(y=>{
    const isHidden=hiddenCols&&y!==curYr&&y!==prevYr;
    html+=`<td class="${isHidden?'col-hidden':''}" style="background:#E8EBF2;"></td>`;
  });
  if(prevYr) html+=`<td style="background:#E8EBF2;"></td>`;
  html+='</tr>';
  html+=`<tr><td class="label-cell indent">Federal Grants (auto)</td><td class="bracket-cell">18% of income+corp</td>`;
  years.forEach(y=>{
    const isHidden=hiddenCols&&y!==curYr&&y!==prevYr;
    const s=computeSummary(currentRegion,y);
    html+=`<td class="data-cell${isHidden?' col-hidden':''}" style="background:var(--head);">
      <input type="number" value="${fmtNum(s.grants/1e9)}" readonly placeholder="—">
    </td>`;
  });
  if(prevYr) html+=makePctCell(curYr,'grants',prevYr);
  html+='</tr>';

  return html;
}

function buildDeptRows(years){
  const prevYr=years.length>=2?years[years.length-2]:null;
  const curYr=years[years.length-1];
  let html=`<tr class="section-head"><td colspan="${2+years.length+(prevYr?1:0)}">EXPENDITURES</td></tr>`;
  html+=`<tr class="sub-head"><td colspan="2">DEPARTMENTS</td>`;
  years.forEach(y=>{
    const isHidden=hiddenCols&&y!==curYr&&y!==prevYr;
    html+=`<td class="col-head${isHidden?' col-hidden':''}">${y}</td>`;
  });
  if(prevYr) html+=`<td class="col-head">$ Change</td>`;
  html+='</tr>';

  DEPT_ROWS.forEach(r=>{
    html+=`<tr><td class="label-cell indent">${r.label}</td><td class="bracket-cell">$B</td>`;
    years.forEach(y=>{
      const isHidden=hiddenCols&&y!==curYr&&y!==prevYr;
      html+=`<td class="data-cell${isHidden?' col-hidden':''}">
        <input type="number" id="${cellId(y,r.id)}" value="${fmtNum(getData(currentRegion,y,r.id))}"
          step="0.1" placeholder="—" data-year="${y}" data-field="${r.id}">
      </td>`;
    });
    if(prevYr){
      const cur=parseFloat(getData(currentRegion,curYr,r.id))||0;
      const prev=parseFloat(getData(currentRegion,prevYr,r.id))||0;
      const diff=cur-prev;
      const cls=diff>0?'pos':(diff<0?'neg':'neutral');
      const str=diff===0?'—':(diff>0?'+':'')+diff.toFixed(2)+'B';
      html+=`<td class="pct-cell ${cls}">${str}</td>`;
    }
    html+='</tr>';
  });
  return html;
}

function buildSummaryRows(years){
  const prevYr=years.length>=2?years[years.length-2]:null;
  const curYr=years[years.length-1];
  let html=`<tr class="blank-row"><td colspan="${2+years.length+(prevYr?1:0)}"></td></tr>`;

  // Interest rate input row
  html+=`<tr><td class="label-cell indent">Interest Rate on Debt</td><td class="bracket-cell">%</td>`;
  years.forEach(y=>{
    const isHidden=hiddenCols&&y!==curYr&&y!==prevYr;
    html+=`<td class="data-cell${isHidden?' col-hidden':''}">
      <input type="number" id="${cellId(y,'interestRate')}" value="${fmtNum(getData(currentRegion,y,'interestRate')||4)}"
        step="0.1" placeholder="4.0" data-year="${y}" data-field="interestRate">
    </td>`;
  });
  if(prevYr) html+=`<td class="pct-cell neutral">—</td>`;
  html+='</tr>';

  // Prior debt input
  html+=`<tr><td class="label-cell indent">Prior Year Debt</td><td class="bracket-cell">$B</td>`;
  years.forEach(y=>{
    const isHidden=hiddenCols&&y!==curYr&&y!==prevYr;
    html+=`<td class="data-cell${isHidden?' col-hidden':''}">
      <input type="number" id="${cellId(y,'prevDebt')}" value="${fmtNum(getData(currentRegion,y,'prevDebt')||DEBT_DEFAULTS[currentRegion])}"
        step="1" placeholder="—" data-year="${y}" data-field="prevDebt">
    </td>`;
  });
  if(prevYr) html+=`<td class="pct-cell neutral">—</td>`;
  html+='</tr>';

  // Computed summary rows
  const summaryFields=[
    {id:'netInterest',label:'Net Interest on Debt',key:'netInterest',divisor:1e9},
    {id:'totalRevenue',label:'Total Revenue',key:'totalRevenue',divisor:1e9},
    {id:'totalExp',label:'Total Expenditure',key:'totalExp',divisor:1e9},
    {id:'balance',label:'Surplus / Deficit',key:'balance',divisor:1e9},
    {id:'totalDebt',label:'Total Debt',key:'totalDebt',divisor:1e9},
  ];

  html+=`<tr class="blank-row"><td colspan="${2+years.length+(prevYr?1:0)}"></td></tr>`;
  summaryFields.forEach(f=>{
    html+=`<tr class="summary-row"><td class="label-cell">${f.label}</td><td class="bracket-cell">$B</td>`;
    years.forEach(y=>{
      const isHidden=hiddenCols&&y!==curYr&&y!==prevYr;
      const s=computeSummary(currentRegion,y);
      const val=(s[f.key]||0)/f.divisor;
      html+=`<td class="data-cell${isHidden?' col-hidden':''}" style="background:var(--head);">
        <input type="number" value="${fmtNum(val)}" readonly>
      </td>`;
    });
    if(prevYr){
      const sc=computeSummary(currentRegion,curYr);
      const sp=computeSummary(currentRegion,prevYr);
      const cur=(sc[f.key]||0)/f.divisor;
      const prev=(sp[f.key]||0)/f.divisor;
      const {str,cls}=fmtPct(cur,prev);
      html+=`<td class="pct-cell ${cls}">${str}</td>`;
    }
    html+='</tr>';
  });
  return html;
}

function buildStatsRows(years){
  const prevYr=years.length>=2?years[years.length-2]:null;
  const curYr=years[years.length-1];
  let html=`<tr class="blank-row"><td colspan="${2+years.length+(prevYr?1:0)}"></td></tr>`;
  html+=`<tr class="section-head"><td colspan="${2+years.length+(prevYr?1:0)}">STATISTICS</td></tr>`;
  html+=`<tr class="blank-row"><td colspan="${2+years.length+(prevYr?1:0)}"></td></tr>`;

  const statDefs=[
    {id:'gdp',label:'GDP ($T)',fmt:n=>(n/1e12).toFixed(2)+'T'},
    {id:'avgIncome',label:'Avg. Income ($)',fmt:n=>'$'+Math.round(n).toLocaleString('en-US')},
    {id:'costOfLiving',label:'Cost of Living ($)',fmt:n=>'$'+Math.round(n).toLocaleString('en-US')},
    {id:'unemployment',label:'Unemployment (%)',fmt:n=>n+'%'},
    {id:'poverty',label:'Poverty Rate (%)',fmt:n=>n+'%'},
    {id:'totalDebt',label:'Regional Debt ($B)',fmt:n=>'$'+(n/1e9).toFixed(1)+'B'},
    {id:'leading',label:'Leading Sector',fmt:n=>n},
    {id:'lagging',label:'Lagging Sector',fmt:n=>n},
  ];

  statDefs.forEach(s=>{
    html+=`<tr class="stat-row"><td class="label-cell">${s.label}</td><td class="bracket-cell"></td>`;
    years.forEach(y=>{
      const isHidden=hiddenCols&&y!==curYr&&y!==prevYr;
      const st=computeStats(currentRegion,y);
      const val=st[s.id];
      const display=val!=null?s.fmt(val):'—';
      html+=`<td class="data-cell${isHidden?' col-hidden':''}" style="background:var(--head);">
        <input type="text" value="${display}" readonly>
      </td>`;
    });
    if(prevYr) html+=`<td class="pct-cell neutral"></td>`;
    html+='</tr>';
  });
  return html;
}

function rebuildTable(){
  const {visible,all}=getVisibleYears();
  const years=hiddenCols?visible:all;
  const prevYr=years.length>=2?years[years.length-2]:null;
  const curYr=years[years.length-1];

  let html='';
  // Col header
  html+=`<tr class="section-head"><td colspan="${2+years.length+(prevYr?1:0)}">TAXATION</td></tr>`;
  html+=buildColHeader(years);
  html+=buildTaxRows(years);
  html+=`<tr class="blank-row"><td colspan="${2+years.length+(prevYr?1:0)}"></td></tr>`;
  html+=buildDeptRows(years);
  html+=buildSummaryRows(years);
  html+=buildStatsRows(years);

  document.getElementById('tableBody').innerHTML=html;

  // Attach input listeners
  document.querySelectorAll('#ledgerTable input:not([readonly])').forEach(el=>{
    el.addEventListener('change',e=>{
      const y=e.target.dataset.year;
      const f=e.target.dataset.field;
      if(y&&f){
        setData(currentRegion,y,f,parseFloat(e.target.value)||0);
        // Recompute computed cells without full rebuild
        updateComputedCells(years);
      }
    });
  });
}

function updateComputedCells(years){
  // Re-render grants, summary, stats rows without full rebuild
  years.forEach(y=>{
    const s=computeSummary(currentRegion,y);
    // grants
    const gid=cellId(y,'grants');
    const gel=document.getElementById(gid);
    // grants cell has no id — just rerender full table
  });
  rebuildTable();
  renderStats();
}

function renderStats(){
  const st=computeStats(currentRegion,currentYearStr);
  const container=document.getElementById('statsCards');
  const items=[
    {label:'GDP',value:'$'+(st.gdp/1e12).toFixed(2)+'T',sub:currentYearStr},
    {label:'Avg. Income',value:'$'+Math.round(st.avgIncome).toLocaleString('en-US'),sub:'per capita'},
    {label:'Cost of Living',value:'$'+Math.round(st.costOfLiving).toLocaleString('en-US'),sub:'annual'},
    {label:'Unemployment',value:st.unemployment+'%',sub:'of workforce'},
    {label:'Poverty Rate',value:st.poverty+'%',sub:'of population'},
    {label:'Regional Debt',value:'$'+(st.totalDebt/1e9).toFixed(1)+'B',sub:'total outstanding'},
    {label:'Leading Sector',value:st.leading,sub:'highest growth',extra:'leading'},
    {label:'Lagging Sector',value:st.lagging,sub:'lowest growth',extra:'lagging'},
  ];
  container.innerHTML=items.map(i=>`
    <div class="stat-card ${i.extra||''}">
      <div class="s-label">${i.label}</div>
      <div class="s-value">${i.value}</div>
      <div class="s-sub">${i.sub}</div>
    </div>`).join('');
}

        expJustice:2,expHUD:36,expLabour:10,expAg:20,expTreasury:2,expAdmin:2,expSocial:9},
      interestRate:4.3,prevDebt:488
    },
    Pacifica:{
      rates:{inc_Lower:3,inc_Middle:6,inc_Upper:9,corp_Small:7,corp_Large:11,
        sales_Gasoline:5,sales_Alcohol:8,sales_Tobacco:12,
        serv_GeneralSales:5.5,serv_Services:5,serv_CapitalGains:11},
      depts:{expEducation:16,expHealth:44,expTransport:5,expSafety:9,
        expJustice:1,expHUD:23,expLabour:7,expAg:13,expTreasury:2,expAdmin:1,expSocial:6},
      interestRate:4.0,prevDebt:400
    }
  };
  const fy='1993-94';
  REGIONS.forEach(r=>{
    if(allData[r]&&allData[r][fy]&&Object.keys(allData[r][fy]).length>2) return; // already seeded
    if(!allData[r]) allData[r]={};
    if(!allData[r][fy]) allData[r][fy]={};
    const d=SEED[r];
    TAX_ROWS.forEach(row=>{ allData[r][fy][row.id+'_rate']=d.rates[row.id]||0; });
    DEPT_ROWS.forEach(row=>{ allData[r][fy][row.id]=d.depts[row.id]||0; });
    allData[r][fy]['interestRate']=d.interestRate;
    allData[r][fy]['prevDebt']=d.prevDebt;
  });
}

async function init(){
  await loadFromStorage();
  preSeedData();
  buildYearSelect();
  buildRegionTabs();
  rebuildTable();
  renderStats();
}

init();
</script>
